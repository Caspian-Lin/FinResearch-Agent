# =============================================================================
# FinResearch Agent — Redis 配置（开发环境）
# =============================================================================
# 挂载点：/usr/local/etc/redis/redis.conf
# 加载方式：docker-compose 中
#   command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
# 每次容器启动都会重新读取；修改后 `docker compose restart redis` 即可生效。
# =============================================================================

# ----- 网络 -----
# 允许从容器外（含宿主机 6379 映射）访问
bind 0.0.0.0
# 容器内访问，关闭保护模式（docker 网络已做隔离）
protected-mode no
port 6379

# 客户端空闲 N 秒后断开（0=禁用）
timeout 300
# TCP keepalive 探测间隔（秒），保持长连接活性
tcp-keepalive 60

# ----- 日志 -----
loglevel notice
# logfile 留空，输出到 stdout 供 docker logs 查看
logfile ""

# ----- 内存管理（开发环境：256MB + LRU 淘汰） -----
maxmemory 256mb
# 当内存达到上限时按 LRU 淘汰任意 key（含缓存与队列）
maxmemory-policy allkeys-lru

# ----- RDB 快照持久化 -----
save 900 1
save 300 10
save 60 10000
# RDB 文件名与目录（容器内 /data 由 redis_data 卷映射）
dbfilename dump.rdb
dir /data

# ----- AOF 追加持久化 -----
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ----- 其他 -----
# 关闭威胁命令的别名（开发环境保持默认，不重命名）
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
