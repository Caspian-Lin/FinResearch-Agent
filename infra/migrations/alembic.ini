# =============================================================================
# Alembic 配置文件 — FinResearch Agent
# =============================================================================
# 调用方式：alembic -c /app/infra/migrations/alembic.ini upgrade head
# env.py 与 versions/ 都在当前目录（script_location=%(here)s）
# 数据库连接串从 env.py 中读取环境变量 DATABASE_URL，本文件中 sqlalchemy.url
# 故意留空。
# =============================================================================

[alembic]
# 迁移脚本目录（env.py + versions/ 都在当前目录）
# %(here)s 解析为 alembic.ini 所在目录，使 -c 可在任意 cwd 下正确加载 env.py
script_location = %(here)s

# 把当前目录加入 sys.path，使 `from app.db.base import Base` 在容器内可用
prepend_sys_path = .

# 模板文件
version_locations = %(here)s/versions

# 迁移文件命名：年月日时分-rev-slug，便于按时间排序
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区：UTC
timezone = UTC

# 迁移脚本文件头注释
output_encoding = utf-8

# sqlalchemy.url 故意留空——由 env.py 从 DATABASE_URL 环境变量读取
sqlalchemy.url =


# -----------------------------------------------------------------------------
# 以下为 Alembic 默认日志配置，无需修改
# -----------------------------------------------------------------------------

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
